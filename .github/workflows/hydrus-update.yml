name: Hydrus Update

on:
  workflow_dispatch:
  schedule:
    - cron: "45 23 * * 3"

jobs:
  update-hydownloader:
    name: "Update Hydrus"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/create-github-app-token@v2
        id: generate-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: actions/checkout@v4
        with:
          token: ${{ steps.generate-token.outputs.token }}
          persist-credentials: false
      - name: Configure Git
        run: |
          git config --global user.name '${{ steps.generate-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.generate-token.outputs.app-slug }}[bot]@users.noreply.github.com'
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Determine current version
        run: echo "PREV_VERSION=$(nix eval .#hydrus.version --raw)" >> $GITHUB_ENV
      - name: Run nix-update
        run: nix run nixpkgs#nix-update -- --flake hydrus
      - name: Determine new version
        run: echo "NEXT_VERSION=$(nix eval .#hydrus.version --raw)" >> $GITHUB_ENV
      - name: Migrate DB seed
        run: nix run .#migrate-db-seed
      - name: Create a pull request
        run: |-
          create_or_update_pr() {
            local branch="$1"
            local title="$2"
            local body="${3:-}"
            local base="${4:-master}"
            local pr_num=$(gh pr list --head "$branch" --json number -q '.[0].number // empty')
            if [ -z "$pr_num" ]; then
              gh pr create --title "$title" --body "$body" --base "$base" --head "$branch"
            else
              gh pr edit "$pr_num" --title "$title" --body "$body"
            fi
          }
          if ! git diff --quiet; then
            git checkout -B hydrus-auto-update
            git commit -am "hydrus: $PREV_VERSION -> $NEXT_VERSION"
            git push --force origin hydrus-auto-update
            create_or_update_pr \
              hydrus-auto-update \
              "hydrus: $PREV_VERSION -> $NEXT_VERSION" \
              "Update hydrus from $PREV_VERSION to $NEXT_VERSION."
          fi
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
